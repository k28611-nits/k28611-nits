<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" role="img" aria-label="Kushagra Kumar, Senior Software Engineer and backend developer specializing in Go and C#. A sun marks light mode; a crescent moon and stars mark dark mode.">
  <style>
    :root {
      --accent: #0d9488; --name: #1f2328; --sub: #57606a; --muted: #6e7781;
    }
    .only-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      :root { --accent: #2dd4bf; --name: #e6edf3; --sub: #adbac7; --muted: #768390; }
      .only-dark { display: inline; }
      .only-light { display: none; }
    }
  </style>

  <rect x="40" y="34" width="5" height="132" rx="2.5" fill="var(--accent)"/>
  <text x="66" y="58" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14" font-weight="600" letter-spacing="3.5" fill="var(--accent)">SENIOR SOFTWARE ENGINEER</text>
  <text x="63" y="114" font-family="Georgia,'Times New Roman',serif" font-size="53" font-weight="700" fill="var(--name)">Kushagra Kumar</text>
  <text x="66" y="150" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="17" fill="var(--sub)">Backend Developer specializing in Go routines and optional C# threading.</text>
  <text x="66" y="176" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14.5" fill="var(--muted)">Distributed systems &#183; concurrency &#183; clean APIs &#8212; Go &#183; C#</text>

  <!-- LIGHT MODE: sun with rotating rays + drifting cloud -->
  <g class="only-light">
    <circle cx="742" cy="64" r="26" fill="#eab308" opacity="0.1">
      <animate attributeName="opacity" values="0.1;0.18;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#eab308" stroke-width="2.5" stroke-linecap="round">
      <line x1="742" y1="38" x2="742" y2="30"/>
      <line x1="742" y1="90" x2="742" y2="98"/>
      <line x1="716" y1="64" x2="708" y2="64"/>
      <line x1="768" y1="64" x2="776" y2="64"/>
      <line x1="723.6" y1="45.6" x2="717.9" y2="39.9"/>
      <line x1="760.4" y1="82.4" x2="766.1" y2="88.1"/>
      <line x1="723.6" y1="82.4" x2="717.9" y2="88.1"/>
      <line x1="760.4" y1="45.6" x2="766.1" y2="39.9"/>
      <animateTransform attributeName="transform" type="rotate" from="0 742 64" to="360 742 64" dur="24s" repeatCount="indefinite"/>
    </g>
    <circle cx="742" cy="64" r="16" fill="#f59e0b"/>
    <circle cx="737" cy="59" r="5" fill="#fbbf24" opacity="0.8"/>
    <g fill="#d0d7de" opacity="0.55">
      <ellipse cx="0" cy="0" rx="20" ry="9"/>
      <ellipse cx="16" cy="-5" rx="14" ry="8"/>
      <ellipse cx="-14" cy="-3" rx="12" ry="7"/>
      <animateTransform attributeName="transform" type="translate" values="600 122;838 112;600 122" keyTimes="0;0.5;1" dur="44s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- DARK MODE: moon, twinkling stars, shooting star -->
  <g class="only-dark">
    <circle cx="742" cy="64" r="26" fill="#2dd4bf" opacity="0.07">
      <animate attributeName="opacity" values="0.07;0.14;0.07" dur="4s" repeatCount="indefinite"/>
    </circle>
    <path d="M750,46 A19,19 0 1 0 750,82 A15,15 0 1 1 750,46 Z" fill="#c9d1d9"/>
    <rect x="646" y="38" width="4" height="4" fill="#e6edf3"><animate attributeName="opacity" values="1;0.15;1" dur="2.2s" calcMode="discrete" keyTimes="0;0.5;0.8" repeatCount="indefinite"/></rect>
    <rect x="688" y="102" width="3" height="3" fill="#adbac7"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" calcMode="discrete" keyTimes="0;0.45;0.75" repeatCount="indefinite"/></rect>
    <rect x="792" y="98" width="4" height="4" fill="#e6edf3"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" calcMode="discrete" keyTimes="0;0.55;0.85" repeatCount="indefinite"/></rect>
    <rect x="806" y="36" width="3" height="3" fill="#adbac7"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" calcMode="discrete" keyTimes="0;0.5;0.8" repeatCount="indefinite"/></rect>
    <rect x="668" y="66" width="3" height="3" fill="#adbac7"><animate attributeName="opacity" values="1;0.25;1" dur="3.1s" calcMode="discrete" keyTimes="0;0.4;0.7" repeatCount="indefinite"/></rect>
    <rect x="768" y="120" width="3" height="3" fill="#e6edf3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" calcMode="discrete" keyTimes="0;0.5;0.82" repeatCount="indefinite"/></rect>
    <line x1="0" y1="0" x2="14" y2="7" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animateTransform attributeName="transform" type="translate" values="640 26;820 116" keyTimes="0;1" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.62;0.66;0.74;1" dur="9s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
